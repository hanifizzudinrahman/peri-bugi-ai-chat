services:
  ai-chat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: peri_bugi_ai_chat
    ports:
      - "8003:8003"
    env_file: .env
    volumes:
      - ./app:/app/app
      - huggingface_cache:/root/.cache/huggingface
    command: uvicorn app.main:app --host 0.0.0.0 --port 8003 --reload
    extra_hosts:
      # Akses Ollama + Redis dari host Windows
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Redis dari peri-bugi-api (exposed ke host port 6379)
      # Kosongkan jika tidak pakai Redis di dev
      # - REDIS_URL=redis://host.docker.internal:6379/0
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: peri_bugi_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
  huggingface_cache:
