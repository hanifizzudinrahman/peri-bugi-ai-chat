services:
  ai-chat:
    build: .
    ports:
      - "8003:8003"
    env_file: .env
    volumes:
      - ./app:/app/app   # hot reload saat development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8003 --reload
    extra_hosts:
      - "host.docker.internal:host-gateway"  # akses Ollama di host

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
