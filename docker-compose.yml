services:
  ai-chat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: peri_bugi_ai_chat
    ports:
      - "8003:8003"
    env_file: .env
    environment:
      # Make `app.xxx` imports work for pytest + ad-hoc scripts
      PYTHONPATH: /app
      # GPU access
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # Redis dari peri-bugi-api (exposed ke host port 6379)
      # Kosongkan jika tidak pakai Redis di dev
      # REDIS_URL: redis://host.docker.internal:6379/0
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./pytest.ini:/app/pytest.ini
      - huggingface_cache:/root/.cache/huggingface
    command: uvicorn app.main:app --host 0.0.0.0 --port 8003 --reload
    extra_hosts:
      # Akses Ollama + Redis dari host Windows
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - default
      - peri-bugi-shared

  qdrant:
    image: qdrant/qdrant:latest
    container_name: peri_bugi_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - default
      - peri-bugi-shared

volumes:
  qdrant_data:
  huggingface_cache:

networks:
  default:
  peri-bugi-shared:
    name: peri-bugi-shared
    external: true
